<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Forest green rounded background -->
  <rect x="0" y="0" width="32" height="32" rx="5" ry="5" fill="#132018"/>
  <!-- Scales of justice in gold -->
  <!-- Center post -->
  <line x1="16" y1="6" x2="16" y2="26" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Top knob -->
  <circle cx="16" cy="6" r="1.5" fill="#c9a84c"/>
  <!-- Horizontal beam -->
  <line x1="4" y1="10" x2="28" y2="10" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Left pan cord -->
  <line x1="7" y1="10" x2="7" y2="16" stroke="#c9a84c" stroke-width="1" stroke-linecap="round"/>
  <!-- Left pan arc -->
  <path d="M 4 16 Q 5.5 19 7 16 Q 8.5 19 10 16" fill="none" stroke="#c9a84c" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right pan cord -->
  <line x1="25" y1="10" x2="25" y2="16" stroke="#c9a84c" stroke-width="1" stroke-linecap="round"/>
  <!-- Right pan arc -->
  <path d="M 22 16 Q 23.5 19 25 16 Q 26.5 19 28 16" fill="none" stroke="#c9a84c" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Base platform -->
  <line x1="10" y1="26" x2="22" y2="26" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="10" y1="26" x2="13" y2="22" stroke="#c9a84c" stroke-width="1" stroke-linecap="round"/>
  <line x1="22" y1="26" x2="19" y2="22" stroke="#c9a84c" stroke-width="1" stroke-linecap="round"/>
</svg>
